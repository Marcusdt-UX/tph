name: Deploy TPH

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger from GitHub UI

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run minify && npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: business42.web-hosting.com
          username: tph-deploy@thomaspublishinghouse.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_site/
          server-dir: /
          protocol: ftps
          timeout: 60000

      - name: Verify deployment
        run: |
          sleep 10
          echo "=== Checking for deploy marker ==="
          BODY=$(curl -s https://thomaspublishinghouse.com/)
          if echo "$BODY" | grep -q "TPH-DEPLOY-MARKER"; then
            echo "Deploy verified — marker found in HTML"
          else
            echo "::warning::Deploy marker NOT found — possible caching issue"
          fi
          echo "=== Checking JS for runChunked ==="
          JS=$(curl -s https://thomaspublishinghouse.com/assets/js/main.min.js?v=3)
          if echo "$JS" | grep -q "runChunked"; then
            echo "JS verified — runChunked present"
          else
            echo "::warning::JS still has old code — runChunked NOT found"
          fi

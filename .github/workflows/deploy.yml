name: Deploy TPH

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger from GitHub UI

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run minify && npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: business42.web-hosting.com
          username: tph-deploy@thomaspublishinghouse.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_site/
          server-dir: /public_html/thomaspublishinghouse.com/
          protocol: ftps
          timeout: 60000

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://thomaspublishinghouse.com)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Site returned HTTP $STATUS"
          else
            echo "Site is live — HTTP 200"
          fi

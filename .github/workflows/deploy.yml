name: Deploy TPH

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger from GitHub UI

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run minify && npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: business42.web-hosting.com
          username: tph-deploy@thomaspublishinghouse.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_site/
          server-dir: /
          protocol: ftps
          timeout: 60000

      - name: FTP path diagnostic
        run: |
          sudo apt-get install -y -qq lftp > /dev/null 2>&1
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            open business42.web-hosting.com;
            user tph-deploy@thomaspublishinghouse.com ${{ secrets.FTP_PASSWORD }};
            echo '=== PWD (FTP home) ===';
            pwd;
            echo '=== LS / (root listing) ===';
            ls /;
            echo '=== Check /index.html ===';
            cat /index.html | head -3;
            echo '=== Check /public_html/ ===';
            ls /public_html/ 2>/dev/null || echo 'No /public_html/ directory';
            echo '=== DONE ===';
            bye;
          "
